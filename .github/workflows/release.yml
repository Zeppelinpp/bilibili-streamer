name: Release Bilibili-Streamer

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  check-version:
    name: Verify Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          TAG=${GITHUB_REF_NAME#v}
          PKG=$(jq -r '.version' package.json)
          TAURI=$(jq -r '.version' src-tauri/tauri.conf.json)
          CARGO=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          echo "tag:     v$TAG"
          echo "package: $PKG"
          echo "tauri:   $TAURI"
          echo "cargo:   $CARGO"

          FAILED=0
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::package.json version ($PKG) does not match tag (v$TAG)"
            FAILED=1
          fi
          if [ "$TAG" != "$TAURI" ]; then
            echo "::error::tauri.conf.json version ($TAURI) does not match tag (v$TAG)"
            FAILED=1
          fi
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Cargo.toml version ($CARGO) does not match tag (v$TAG)"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Please update version in package.json, src-tauri/tauri.conf.json, and src-tauri/Cargo.toml before pushing the tag."
            exit 1
          fi

          echo "All versions match. Proceeding to build."

  build:
    name: Build on ${{ matrix.platform }}
    needs: check-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Bilibili-Streamer ${{ github.ref_name }}'
          releaseBody: |
            ## Bilibili-Streamer ${{ github.ref_name }}

            ### Downloads
            - **macOS** (Intel & Apple Silicon): `.dmg`
            - **Windows**: `.msi` installer
            - **Linux**: `.AppImage`

            > **Windows users:** If SmartScreen shows a warning, click "More info" → "Run anyway". This is normal for unsigned open-source software.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
